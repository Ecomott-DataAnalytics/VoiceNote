# VoiceNote モデル定義
#
# 各エントリ:
#   id       : エンジンに渡すモデル識別子（HF id や faster-whisper のモデル名）
#   engine   : 使用エンジン (faster-whisper | kotoba | reazon | qwen3)
#   category : UIのグループ見出し
#   label    : UIに表示する名称
#   description: UI表示用のユーザー向け特徴（対応言語/精度/速度/話者分離/用途など）
#   vram     : VRAM目安（開発者向けの内部参考値。UIには表示しない）
#   languages: （任意）対応言語を限定する場合に指定
#   options  : （任意）エンジン固有オプション（例: kotoba の diarization）
#
# default : UIの初期選択モデルID

default: reazon-research/reazonspeech-k2-v2

models:
  - id: large-v3
    engine: faster-whisper
    category: Whisper
    label: Large-v3
    description: "多言語対応の汎用モデル。日本語・英語など幅広い言語に対応。"
    vram: "4〜6GB"

  - id: kotoba-tech/kotoba-whisper-v2.2
    engine: kotoba
    category: Kotoba
    label: "v2.2 (話者分離)"
    description: "日本語特化・高精度。話者分離つき（誰の発言かを区別）。議事録向け。"
    vram: "5〜8GB"
    languages: [ja]
    options:
      diarization: true

  - id: kotoba-tech/kotoba-whisper-v2.0
    engine: kotoba
    category: Kotoba
    label: "v2.0 (シンプル)"
    description: "日本語特化・高精度。話者分離なしのシンプルな文字起こし。"
    vram: "5〜8GB"
    languages: [ja]
    options:
      diarization: false

  - id: reazon-research/reazonspeech-k2-v2
    engine: reazon
    category: ReazonSpeech
    label: k2-v2
    description: "日本語専用・高速。迷ったらこれ（標準のおすすめ）。"
    vram: "2〜4GB"
    languages: [ja]

  - id: Qwen/Qwen3-ASR-0.6B
    engine: qwen3
    category: Qwen3-ASR
    label: 0.6B
    description: "多言語対応・軽量で高速。"
    vram: "6〜10GB"

  - id: Qwen/Qwen3-ASR-1.7B
    engine: qwen3
    category: Qwen3-ASR
    label: 1.7B
    description: "多言語対応・最高精度（処理はやや重め）。"
    vram: "12〜20GB"
