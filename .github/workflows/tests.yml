name: tests

# GPU不要のユニットテストのみを実行する。
# 各STTエンジンの重いML依存(torch/transformers/qwen-asr等)は load() 内で遅延
# importされるため、これらをインストールしなくても config/factory/endpoint の
# テストは実行できる。実推論の検証はGPUホストでのコンテナビルド後に行う。

on:
  push:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lightweight (no-GPU) dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml flask celery redis psutil gputil

      - name: Run unit tests
        run: python -m pytest tests/ -v
